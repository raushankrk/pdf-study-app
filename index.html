<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Linker Studio (AI + SQLite Storage)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- PDF-Lib (For Editing) -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <!-- SQL.js (For Project Storage) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <!-- FileSaver.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const { PDFDocument } = PDFLib;
    </script>
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden text-gray-800 font-sans">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-4 shrink-0 z-20 shadow-sm">
        <div class="flex items-center gap-3">
            <!-- Left Sidebar Toggle -->
            <button onclick="toggleLeftSidebar()" class="toggle-left-btn w-8 h-8 rounded hover:bg-gray-100 text-gray-500 transition-transform" title="Toggle Documents Sidebar">
                <i class="fa-solid fa-bars"></i>
            </button>

            <i class="fa-solid fa-file-pdf text-red-500 text-2xl"></i>
            <div>
                <h1 class="text-xl font-bold text-gray-800 leading-tight">PDF Linker Studio</h1>
                <p class="text-[10px] text-green-600 font-medium"><i class="fa-solid fa-check-circle"></i> Ready</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <!-- Mode Switcher -->
            <div class="flex bg-gray-100 rounded-lg p-1">
                <button id="mode-nav-btn" class="px-3 py-1.5 rounded-md text-sm font-medium bg-white shadow-sm text-gray-800 transition-all" onclick="setAppMode('navigation')" title="Navigate Mode">
                    <i class="fa-solid fa-arrow-pointer"></i>
                </button>
                <button id="mode-link-btn" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition-all" onclick="setAppMode('linking')" title="Draw Link Mode">
                    <i class="fa-solid fa-link"></i>
                </button>
                <!-- NEW SNIP & LINK BUTTON -->
                <button id="mode-snip-link-btn" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition-all" onclick="setAppMode('snip-link')" title="Snip Image & Link">
                    <i class="fa-solid fa-scissors"></i>
                </button>
                <button id="mode-del-link-btn" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition-all relative" onclick="setAppMode('delete-link')" title="Delete Link Mode (Click links to delete)">
                    <i class="fa-solid fa-eraser"></i>
                    <i class="fa-solid fa-link absolute -bottom-0.5 -right-0.5 text-[8px] text-red-500 bg-white rounded-full"></i>
                </button>
                <button id="mode-anno-btn" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition-all" onclick="setAppMode('annotation')" title="Annotation Mode">
                    <i class="fa-solid fa-pen"></i>
                </button>
            </div>

            <!-- Annotation Sub-Tools -->
            <div id="anno-tools" class="hidden flex items-center gap-1 bg-white border border-gray-200 rounded-lg px-2 py-1 shadow-sm">
                <button id="tool-select" class="w-8 h-8 rounded flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors" onclick="setAnnoTool('select')" title="Select / Group / Move / Resize">
                    <i class="fa-solid fa-object-group"></i>
                </button>
                <button id="tool-pen" class="w-8 h-8 rounded flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors" onclick="setAnnoTool('pen')" title="Pen">
                    <i class="fa-solid fa-pen-nib"></i>
                </button>
                <button id="tool-text" class="w-8 h-8 rounded flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors" onclick="setAnnoTool('text')" title="Add Text Box">
                    <i class="fa-solid fa-font"></i>
                </button>
                <button id="tool-eraser-pixel" class="w-8 h-8 rounded flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors" onclick="setAnnoTool('eraser-pixel')" title="Pixel Eraser">
                    <i class="fa-solid fa-eraser"></i>
                </button>
                <button id="tool-eraser-stroke" class="w-8 h-8 rounded flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors" onclick="setAnnoTool('eraser-stroke')" title="Stroke Eraser (Swipe to Delete)">
                    <i class="fa-solid fa-ban"></i>
                </button>
                <button id="tool-highlighter" class="w-8 h-8 rounded flex items-center justify-center text-yellow-600 hover:bg-yellow-50 transition-colors" onclick="setAnnoTool('highlighter')" title="Highlighter">
                    <i class="fa-solid fa-highlighter"></i>
                </button>
                
                <div class="w-px h-5 bg-gray-300 mx-1"></div>

                <button id="tool-image" onclick="setAnnoTool('image')" class="w-8 h-8 rounded flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors" title="Add Image (Click anywhere to place)">
                    <i class="fa-regular fa-image"></i>
                </button>
                <input type="file" id="image-upload" class="hidden" accept="image/*">
                
                <div class="w-px h-5 bg-gray-300 mx-1"></div>

                <div class="relative w-8 h-8 overflow-hidden rounded-full border border-gray-300 shadow-sm cursor-pointer" title="Pen Color">
                    <input type="color" id="color-picker" class="absolute -top-2 -left-2 w-12 h-12 p-0 border-0 cursor-pointer" value="#ef4444">
                </div>

                <div class="flex items-center gap-1 mx-1 w-auto" title="Pen Thickness">
                    <i class="fa-solid fa-circle text-[8px] text-gray-400"></i>
                    <input type="range" id="thickness-picker" min="1" max="20" value="5" class="w-20 h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                    <i class="fa-solid fa-circle text-sm text-gray-400"></i>
                    <span id="thickness-val" class="text-xs font-mono text-gray-600 w-6 text-center">5</span>
                </div>

                <div class="w-px h-5 bg-gray-300 mx-1"></div>

                <button onclick="deleteSelection()" class="w-8 h-8 rounded flex items-center justify-center text-red-600 hover:bg-red-50 hover:text-red-700 transition-colors" title="Delete Selection">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
                <button onclick="undoLastStroke()" class="w-8 h-8 rounded flex items-center justify-center text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors" title="Undo Last Line">
                    <i class="fa-solid fa-rotate-left"></i>
                </button>
                <button onclick="clearCurrentPageAnnotations()" class="w-8 h-8 rounded flex items-center justify-center text-gray-600 hover:bg-red-50 hover:text-red-600 transition-colors" title="Clear Page">
                    <i class="fa-solid fa-file-circle-xmark"></i>
                </button>
            </div>

            <div class="h-8 w-px bg-gray-300 mx-2"></div>
            
            <button onclick="exportProject()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm px-3 py-1.5 rounded shadow-sm flex items-center gap-2 transition-colors">
                <i class="fa-solid fa-floppy-disk"></i> Save
            </button>
            <label class="text-gray-600 hover:text-blue-600 font-medium text-sm flex items-center gap-2 cursor-pointer border border-gray-200 hover:border-blue-300 px-3 py-1.5 rounded bg-white transition-colors">
                <i class="fa-solid fa-folder-open"></i> Open
                <input type="file" id="import-project-input" class="hidden" accept=".sqlite">
            </label>

            <div class="h-8 w-px bg-gray-300 mx-2"></div>

            <!-- AI Toggle in Header -->
            <button onclick="toggleAiSidebar()" class="toggle-ai-btn bg-indigo-50 text-indigo-600 hover:bg-indigo-100 border border-indigo-200 px-3 py-1.5 rounded shadow-sm flex items-center gap-2 transition-transform font-medium text-sm" title="Toggle AI Sidebar">
                <i class="fa-solid fa-robot"></i> <span>AI</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- Left Sidebar -->
        <aside id="left-sidebar" class="bg-white border-r border-gray-200 flex flex-col shrink-0 z-10 w-64">
            <div class="p-4 border-b border-gray-100">
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Documents</h2>
                <label class="flex items-center justify-center w-full h-12 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-colors group">
                    <span class="text-sm text-gray-500 group-hover:text-blue-500">
                        <i class="fa-solid fa-plus mr-1"></i> Import PDFs
                    </span>
                    <input type="file" id="pdf-upload-input" class="hidden" accept=".pdf" multiple>
                </label>
            </div>

            <!-- Global Search -->
            <div class="px-3 py-2 border-b border-gray-100 bg-gray-50/50">
                <div class="relative">
                    <input type="text" id="global-search-input" placeholder="Search all docs..." class="w-full pl-8 pr-2 py-1.5 text-xs border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <i class="fa-solid fa-magnifying-glass absolute left-2.5 top-2 text-gray-400 text-xs"></i>
                </div>
                <div id="global-search-results" class="mt-2 max-h-40 overflow-y-auto hidden"></div>
            </div>
            
            <div id="doc-list" class="flex-1 overflow-y-auto p-2 space-y-2">
                <div id="loading-spinner" class="hidden flex flex-col items-center justify-center mt-10">
                    <div class="spinner mb-2"></div>
                    <span class="text-xs text-gray-500">Processing...</span>
                </div>
                <div class="text-center mt-10 text-gray-400 text-sm italic" id="empty-state-msg">
                    No PDFs imported yet.
                </div>
            </div>

            <div class="p-4 bg-gray-50 border-t border-gray-200">
                <button onclick="clearAllData()" class="w-full py-2 text-xs font-bold text-red-600 border border-red-200 rounded bg-red-50 hover:bg-red-100 transition-colors">
                    <i class="fa-solid fa-trash mr-1"></i> Clear All Data
                </button>
            </div>
        </aside>

        <!-- Workspace (Split View) -->
        <main class="flex-1 flex bg-gray-200 overflow-hidden relative" id="workspace-main">
            
            <!-- Left Viewport -->
            <div id="left-panel" class="flex flex-col border-r border-gray-300 relative min-w-0 group" style="width: 50%;">
                <div class="h-10 bg-white border-b border-gray-300 flex items-center justify-between px-4 shrink-0 z-10">
                    <div class="flex items-center gap-2">

                    <button id="lock-left-btn" onclick="toggleLock('left')" class="lock-btn" title="Lock Left Viewport">
                        <i class="fa-solid fa-lock-open"></i>
                    </button>

                        <span class="text-sm font-bold text-gray-600 truncate w-24" id="left-view-title">None</span>
                        <div class="relative group/search">
                            <input type="text" id="left-search-input" placeholder="Find..." class="hidden pl-6 pr-2 py-0.5 text-[10px] border border-gray-300 rounded w-24 focus:w-32 transition-all focus:outline-none focus:ring-1 focus:ring-blue-500">
                            <button id="left-search-toggle" onclick="toggleViewportSearch('left')" class="w-6 h-6 rounded hover:bg-gray-100 flex items-center justify-center text-gray-500 text-xs">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </button>
                            <div id="left-search-nav" class="hidden absolute right-0 top-6 bg-white shadow-md border rounded flex p-1 z-50">
                                <button onclick="navigateSearchResult('left', -1)" class="p-1 hover:bg-gray-100 rounded text-gray-600 text-xs"><i class="fa-solid fa-chevron-up"></i></button>
                                <span id="left-search-count" class="text-[10px] self-center px-1 text-gray-500">0/0</span>
                                <button onclick="navigateSearchResult('left', 1)" class="p-1 hover:bg-gray-100 rounded text-gray-600 text-xs"><i class="fa-solid fa-chevron-down"></i></button>
                                <button onclick="closeViewportSearch('left')" class="ml-1 p-1 hover:bg-red-50 text-red-500 rounded text-xs"><i class="fa-solid fa-xmark"></i></button>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center gap-2">
                        <div class="flex items-center bg-gray-50 rounded border border-gray-200">
                            <button onclick="zoomViewport('left', -0.25)" class="px-1.5 py-0.5 hover:bg-gray-200 rounded text-gray-600 text-xs"><i class="fa-solid fa-minus"></i></button>
                            <span id="left-zoom-level" class="text-[10px] w-8 text-center font-mono text-gray-500">100%</span>
                            <button onclick="zoomViewport('left', 0.25)" class="px-1.5 py-0.5 hover:bg-gray-200 rounded text-gray-600 text-xs"><i class="fa-solid fa-plus"></i></button>
                            <div class="w-px h-3 bg-gray-300 mx-0.5"></div>
                            <button onclick="resetZoom('left')" class="px-1.5 py-0.5 hover:bg-blue-100 text-blue-600 rounded text-xs" title="Fit Width"><i class="fa-solid fa-expand"></i></button>
                        </div>

                        <div class="w-px h-4 bg-gray-300 mx-1"></div>

                        <button onclick="navigatePage('left', -1)" class="p-1 hover:bg-gray-100 rounded text-gray-600"><i class="fa-solid fa-chevron-left"></i></button>
                        <span id="left-page-indicator" class="text-xs text-gray-500 w-16 text-center">-- / --</span>
                        <button onclick="navigatePage('left', 1)" class="p-1 hover:bg-gray-100 rounded text-gray-600"><i class="fa-solid fa-chevron-right"></i></button>
                        
                        <div class="w-px h-4 bg-gray-300 mx-1"></div>

                        <button onclick="insertPage('left', 'blank')" class="p-1 hover:text-indigo-600 hover:bg-indigo-50 text-gray-400 rounded transition-colors" title="Insert Blank Page After Current"><i class="fa-regular fa-file-circle-plus text-sm"></i></button>
                        <button onclick="insertPage('left', 'duplicate')" class="p-1 hover:text-indigo-600 hover:bg-indigo-50 text-gray-400 rounded transition-colors" title="Duplicate Current Page"><i class="fa-regular fa-clone text-sm"></i></button>
                        <button onclick="deleteCurrentPage('left')" class="p-1 hover:text-red-600 hover:bg-red-50 text-gray-400 rounded transition-colors" title="Delete Current Page"><i class="fa-solid fa-trash-can text-sm"></i></button>
                    </div>
                </div>
                <div class="flex-1 overflow-auto relative flex justify-center p-4 bg-gray-500/10 pdf-canvas-container" id="left-viewport">
                    <div id="left-canvas-wrapper" class="relative shadow-lg">
                        <canvas id="left-canvas" class="pdf-canvas bg-white block"></canvas>
                        <div id="left-text-layer" class="textLayer"></div>
                        <div id="left-search-layer" class="search-highlight-layer"></div>
                        <canvas id="left-anno-canvas" class="annotation-canvas"></canvas>
                        <div id="left-markers-layer" class="absolute inset-0 pointer-events-none"></div>
                    </div>
                </div>
            </div>

            <!-- Vertical Resizer -->
            <div id="vertical-resizer" title="Drag to resize viewports"></div>

            <!-- Right Viewport -->
            <div id="right-panel" class="flex flex-col relative min-w-0" style="width: 50%;">
                <div class="h-10 bg-white border-b border-gray-300 flex items-center justify-between px-4 shrink-0 z-10">
                    <div class="flex items-center gap-2">

                    <button id="lock-right-btn" onclick="toggleLock('right')" class="lock-btn" title="Lock Right Viewport">
                        <i class="fa-solid fa-lock-open"></i>
                    </button>

                        <span class="text-sm font-bold text-gray-600 truncate w-24" id="right-view-title">None</span>
                        <div class="relative group/search">
                            <input type="text" id="right-search-input" placeholder="Find..." class="hidden pl-6 pr-2 py-0.5 text-[10px] border border-gray-300 rounded w-24 focus:w-32 transition-all focus:outline-none focus:ring-1 focus:ring-blue-500">
                            <button id="right-search-toggle" onclick="toggleViewportSearch('right')" class="w-6 h-6 rounded hover:bg-gray-100 flex items-center justify-center text-gray-500 text-xs">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </button>
                            <div id="right-search-nav" class="hidden absolute right-0 top-6 bg-white shadow-md border rounded flex p-1 z-50">
                                <button onclick="navigateSearchResult('right', -1)" class="p-1 hover:bg-gray-100 rounded text-gray-600 text-xs"><i class="fa-solid fa-chevron-up"></i></button>
                                <span id="right-search-count" class="text-[10px] self-center px-1 text-gray-500">0/0</span>
                                <button onclick="navigateSearchResult('right', 1)" class="p-1 hover:bg-gray-100 rounded text-gray-600 text-xs"><i class="fa-solid fa-chevron-down"></i></button>
                                <button onclick="closeViewportSearch('right')" class="ml-1 p-1 hover:bg-red-50 text-red-500 rounded text-xs"><i class="fa-solid fa-xmark"></i></button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-2">
                         <div class="flex items-center bg-gray-50 rounded border border-gray-200">
                            <button onclick="zoomViewport('right', -0.25)" class="px-1.5 py-0.5 hover:bg-gray-200 rounded text-gray-600 text-xs"><i class="fa-solid fa-minus"></i></button>
                            <span id="right-zoom-level" class="text-[10px] w-8 text-center font-mono text-gray-500">100%</span>
                            <button onclick="zoomViewport('right', 0.25)" class="px-1.5 py-0.5 hover:bg-gray-200 rounded text-gray-600 text-xs"><i class="fa-solid fa-plus"></i></button>
                            <div class="w-px h-3 bg-gray-300 mx-0.5"></div>
                            <button onclick="resetZoom('right')" class="px-1.5 py-0.5 hover:bg-blue-100 text-blue-600 rounded text-xs" title="Fit Width"><i class="fa-solid fa-expand"></i></button>
                        </div>

                        <div class="w-px h-4 bg-gray-300 mx-1"></div>

                        <button onclick="navigatePage('right', -1)" class="p-1 hover:bg-gray-100 rounded text-gray-600"><i class="fa-solid fa-chevron-left"></i></button>
                        <span id="right-page-indicator" class="text-xs text-gray-500 w-16 text-center">-- / --</span>
                        <button onclick="navigatePage('right', 1)" class="p-1 hover:bg-gray-100 rounded text-gray-600"><i class="fa-solid fa-chevron-right"></i></button>
                        
                        <div class="w-px h-4 bg-gray-300 mx-1"></div>

                        <button onclick="insertPage('right', 'blank')" class="p-1 hover:text-indigo-600 hover:bg-indigo-50 text-gray-400 rounded transition-colors" title="Insert Blank Page After Current"><i class="fa-regular fa-file-circle-plus text-sm"></i></button>
                        <button onclick="insertPage('right', 'duplicate')" class="p-1 hover:text-indigo-600 hover:bg-indigo-50 text-gray-400 rounded transition-colors" title="Duplicate Current Page"><i class="fa-regular fa-clone text-sm"></i></button>
                        <button onclick="deleteCurrentPage('right')" class="p-1 hover:text-red-600 hover:bg-red-50 text-gray-400 rounded transition-colors" title="Delete Current Page"><i class="fa-solid fa-trash-can text-sm"></i></button>
                    </div>
                </div>
                <div class="flex-1 overflow-auto relative flex justify-center p-4 bg-gray-500/10 pdf-canvas-container" id="right-viewport">
                    <div id="right-canvas-wrapper" class="relative shadow-lg">
                        <canvas id="right-canvas" class="pdf-canvas bg-white block"></canvas>
                        <div id="right-text-layer" class="textLayer"></div>
                        <div id="right-search-layer" class="search-highlight-layer"></div>
                        <canvas id="right-anno-canvas" class="annotation-canvas"></canvas>
                        <div id="right-markers-layer" class="absolute inset-0 pointer-events-none"></div>
                    </div>
                </div>
            </div>

            <svg id="drawing-layer" class="absolute inset-0 w-full h-full z-40 overflow-visible pointer-events-none">
                <path id="current-draw-path" d="" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5" style="display:none;"></path>
                <div id="text-creation-rect" style="display:none; position:absolute; border: 1px dashed #3b82f6; background: rgba(59, 130, 246, 0.1); pointer-events:none;"></div>
            </svg>

            <!-- Floating Snip Preview Layer -->
            <img id="snip-preview" class="hidden fixed pointer-events-none z-[9999] opacity-80 border-2 border-blue-500 border-dashed shadow-xl object-contain bg-white">

            <!-- AI Sidebar -->
            <aside id="ai-sidebar" class="bg-white border-l border-gray-200 flex flex-col shrink-0 z-20 relative overflow-hidden">
                <!-- Header -->
                <div class="h-12 border-b border-gray-200 flex items-center justify-between px-4 bg-gray-50 shrink-0 relative z-40 shadow-sm">
                    <div class="flex items-center gap-2">
                        <button onclick="toggleChatHistory()" class="text-gray-500 hover:text-blue-600 transition-colors w-6 h-6 flex items-center justify-center rounded hover:bg-gray-200" title="Chat History">
                            <i class="fa-solid fa-bars-staggered"></i>
                        </button>
                        <i class="fa-solid fa-robot text-blue-600"></i>
                        <span class="text-sm font-bold text-gray-700">AI Assistant</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="createNewChat()" class="text-gray-400 hover:text-blue-600 transition-colors" title="New Chat">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                        <!-- AI Settings Button -->
                        <button onclick="openAiSettings()" class="text-gray-400 hover:text-blue-600 transition-colors" title="AI Settings">
                            <i class="fa-solid fa-gear"></i>
                        </button>
                    </div>
                </div>

                <!-- Chat History Drawer (Overlay) -->
                <div id="chat-history-drawer" class="absolute top-12 left-0 w-full bottom-0 bg-white shadow-xl transform -translate-x-full transition-transform duration-300 z-30 flex flex-col border-r border-gray-200">
                    <div class="p-3 bg-gray-50 border-b border-gray-100 flex justify-between items-center shrink-0">
                        <span class="text-xs font-bold text-gray-600 uppercase tracking-wider">Chat History</span>
                        <div class="flex gap-2">
                            <button onclick="toggleChatHistory()" class="text-gray-400 hover:text-gray-600 px-2 py-1 transition-colors" title="Close">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                    </div>
                    <div id="chat-list" class="flex-1 overflow-y-auto bg-gray-50/50">
                        <!-- Chat items injected here -->
                    </div>
                </div>

                <!-- Chat Area (Middle) -->
                <div id="chat-history" class="p-4 space-y-4 bg-white overflow-y-auto flex-1 z-10 relative">
                    <div class="text-center text-xs text-gray-400 mt-4">
                        Ask a question about the loaded PDFs.
                        <br>Uses <span class="font-mono">nomic-embed-text</span> & local LLM.
                    </div>
                </div>

                <!-- Input Area (Bottom) -->
                <div class="p-3 border-t border-gray-200 bg-gray-50 shrink-0">
                    <div class="relative">
                        <textarea id="chat-input" rows="2" class="w-full p-2 pr-10 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none" placeholder="Ask about this document..."></textarea>
                        <button id="send-chat-btn" class="absolute bottom-2 right-2 p-1.5 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors">
                            <i class="fa-solid fa-paper-plane text-xs"></i>
                        </button>
                    </div>
                    <div id="ai-status" class="text-[10px] text-gray-500 mt-1 h-4"></div>
                </div>
            </aside>

        </main>
    </div>

    <div id="tool-cursor" class="hidden fixed pointer-events-none z-[100] flex items-center justify-center">
        <i id="tool-cursor-icon" class="fa-thin fa-pen"></i>
    </div>

    <!-- Alert Modal -->
    <div id="modal" class="fixed inset-0 modal-backdrop hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl p-6 max-w-sm w-full">
            <h3 id="modal-title" class="text-lg font-bold mb-2">Alert</h3>
            <div id="modal-body-container" class="mb-4">
                <p id="modal-body" class="text-gray-600 mb-4">Message</p>
                <input type="text" id="modal-input" class="hidden w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex justify-end gap-2" id="modal-actions">
                <button onclick="closeModal(false)" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded text-sm">Cancel</button>
                <button onclick="closeModal(true)" id="modal-confirm-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- AI Settings Modal -->
    <div id="ai-settings-modal" class="fixed inset-0 modal-backdrop hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl p-6 max-w-md w-full max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-robot mr-2 text-blue-600"></i>AI Configuration</h3>
                <button onclick="closeAiSettings()" class="text-gray-400 hover:text-red-500 transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <form id="ai-settings-form" class="space-y-4">
                <!-- 1. Model Selection -->
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Model Selection (Ollama API)</label>
                    <input type="text" id="ai-setting-model" class="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500" placeholder="e.g., gemma3:1b, llama3.2">
                </div>

                <!-- 2. System Prompt -->
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">System Prompt</label>
                    <textarea id="ai-setting-prompt" rows="3" class="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <!-- 3. Response Style -->
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Response Style</label>
                    <select id="ai-setting-style" class="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500">
                        <option value="Concise">Concise</option>
                        <option value="Detailed">Detailed</option>
                        <option value="Expert">Expert</option>
                    </select>
                </div>

                <!-- 4. Temperature -->
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1 flex justify-between">
                        <span>Temperature (Creativity)</span>
                        <span id="ai-setting-temp-val" class="font-mono text-blue-600">0.7</span>
                    </label>
                    <input type="range" id="ai-setting-temp" min="0" max="1" step="0.1" class="w-full accent-blue-600">
                </div>

                <!-- 5. Strict RAG -->
                <div class="flex items-center gap-2 mt-2">
                    <input type="checkbox" id="ai-setting-strict" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                    <label class="text-sm font-medium text-gray-700">Strict RAG Mode (Limit to Context)</label>
                </div>

                <!-- 6. Include Chat History -->
                <div class="flex items-center gap-2 mt-2">
                    <input type="checkbox" id="ai-setting-history" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                    <label class="text-sm font-medium text-gray-700">Include Chat History in Context</label>
                </div>

                <!-- 7. Skip LLM -->
                <div class="flex items-center gap-2 mt-2">
                    <input type="checkbox" id="ai-setting-skip-llm" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                    <label class="text-sm font-medium text-gray-700">Skip LLM (Return Sources Only)</label>
                </div>

                <hr class="border-gray-200 my-2">

                <!-- 8. Similarity Threshold -->
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1 flex justify-between">
                        <span>Similarity Threshold</span>
                        <span id="ai-setting-sim-val" class="font-mono text-blue-600">0.65</span>
                    </label>
                    <input type="range" id="ai-setting-sim" min="0" max="1" step="0.05" class="w-full accent-blue-600">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <!-- 8. Context Budget -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Context Budget (Chars)</label>
                        <input type="number" id="ai-setting-budget" min="1000" max="32000" step="500" class="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500">
                    </div>

                    <!-- 9. Max Chunks -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Max Retrieved Chunks</label>
                        <input type="number" id="ai-setting-max-chunks" min="1" max="30" class="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <!-- 10. Chunk Size -->
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Vector Chunk Size (Chars)</label>
                    <input type="number" id="ai-setting-chunk-size" min="100" max="2000" step="100" class="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500">
                    <p class="text-[10px] text-orange-500 mt-1"><i class="fa-solid fa-triangle-exclamation"></i> Changing this forces a re-index of documents.</p>
                </div>

            </form>

            <div class="mt-6 flex justify-end gap-2 pt-2 border-t border-gray-200">
                <button onclick="resetAiSettings()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded text-sm transition-colors font-medium">Reset Defaults</button>
                <button onclick="saveAiSettings()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm shadow-sm transition-colors font-medium">Save Settings</button>
            </div>
        </div>
    </div>
    
    <script src="js/utils.js"></script>
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/database.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/pdf.js"></script>
    <script src="js/search.js"></script>
    <script src="js/annotations.js"></script>
    <script src="js/links.js"></script>
    <script src="js/events.js"></script>
    <script src="js/app.js"></script> 

</body>
</html>
